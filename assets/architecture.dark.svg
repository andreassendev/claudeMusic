<svg xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 1200 820"
  role="img"
  aria-labelledby="svg-title svg-desc"
>
  <title id="svg-title">claude-music architecture</title>
  <desc id="svg-desc">Orchestrator at the centre surrounded by ten sub-skills; music-composer subagent branches off compose.</desc>
  <style>
