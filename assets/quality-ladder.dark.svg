<svg xmlns="http://www.w3.org/2000/svg"
  viewBox="0 0 900 500"
  role="img"
  aria-labelledby="svg-title svg-desc"
>
  <title id="svg-title">claude-music quality presets</title>
  <desc id="svg-desc">Four ascending quality presets: draft, standard, high, max. The max preset is highlighted as the focal choice.</desc>
  <style>
    text { font-family: 'Inter', system-ui, -apple-system, sans-serif; }
    .t-display { font-weight: 800; font-size: 40px; letter-spacing: -1.2px; }
    .t-heading { font-weight: 700; font-size: 22px; letter-spacing: -0.4px; }
    .t-body    { font-weight: 400; font-size: 15px; letter-spacing: -0.1px; }
    .t-muted   { font-weight: 400; font-size: 13px; }
    .t-eyebrow { font-weight: 700; font-size: 11px; letter-spacing: 1.8px; text-transform: uppercase; }
    .t-mono    { font-family: 'JetBrains Mono', 'IBM Plex Mono', monospace; font-weight: 600; font-size: 13px; }
    .t-brand   { font-weight: 700; font-size: 14px; letter-spacing: 0.2px; }
  </style>
  <rect x="0" y="0" width="100%" height="100%" fill="#262624"/>
  <text x="450" y="46" text-anchor="middle" class="t-eyebrow" fill="#9C9A92">QUALITY PRESETS</text>
  <text x="450" y="78" text-anchor="middle" class="t-heading" fill="#F5F4ED">draft → max</text>
  <path d="M 140 380 L 800 380" fill="none" stroke="#3D3D3A" stroke-width="1"/>
  <path d="M 222 380 L 222 323" fill="none" stroke="#9C9A92" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="222" cy="320" r="6" fill="#9C9A92"/>
  <text x="222" y="300" text-anchor="middle" class="t-heading" fill="#9C9A92">draft</text>
  <text x="222" y="404" text-anchor="middle" class="t-mono" fill="#F5F4ED">~15s</text>
  <text x="222" y="422" text-anchor="middle" class="t-mono" fill="#F5F4ED">batch 4 · turbo</text>
  <text x="222" y="446" text-anchor="middle" class="t-muted" fill="#9C9A92">Quick exploration</text>
  <path d="M 387 380 L 387 273" fill="none" stroke="#9C9A92" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="387" cy="270" r="6" fill="#9C9A92"/>
  <text x="387" y="250" text-anchor="middle" class="t-heading" fill="#9C9A92">standard</text>
  <text x="387" y="404" text-anchor="middle" class="t-mono" fill="#F5F4ED">~15s</text>
  <text x="387" y="422" text-anchor="middle" class="t-mono" fill="#F5F4ED">batch 2 · turbo</text>
  <text x="387" y="446" text-anchor="middle" class="t-muted" fill="#9C9A92">Default. Most sessions.</text>
  <path d="M 552 380 L 552 213" fill="none" stroke="#9C9A92" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="552" cy="210" r="6" fill="#9C9A92"/>
  <text x="552" y="190" text-anchor="middle" class="t-heading" fill="#9C9A92">high</text>
  <text x="552" y="404" text-anchor="middle" class="t-mono" fill="#F5F4ED">~25s</text>
  <text x="552" y="422" text-anchor="middle" class="t-mono" fill="#F5F4ED">thinking · 1.7B LM</text>
  <text x="552" y="446" text-anchor="middle" class="t-muted" fill="#9C9A92">Lyric-heavy songs.</text>
  <path d="M 717 380 L 717 133" fill="none" stroke="#D97757" stroke-width="2" stroke-linecap="round"/>
  <circle cx="717" cy="130" r="6" fill="#D97757"/>
  <text x="717" y="110" text-anchor="middle" class="t-brand" fill="#D97757">max</text>
  <text x="717" y="404" text-anchor="middle" class="t-mono" fill="#F5F4ED">~3-5 min</text>
  <text x="717" y="422" text-anchor="middle" class="t-mono" fill="#F5F4ED">base · 65 steps</text>
  <text x="717" y="446" text-anchor="middle" class="t-muted" fill="#9C9A92">Final-mix quality.</text>
  <text x="58" y="380" class="t-eyebrow" fill="#9C9A92" transform="rotate(-90 58 380)">FASTER</text>
  <text x="58" y="170" class="t-eyebrow" fill="#9C9A92" transform="rotate(-90 58 170)">HIGHER QUALITY</text>
</svg>